name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test and package smoke
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run logic tests
        run: swift test

      - name: Build app bundle
        run: scripts/package-app.sh

      - name: Verify app metadata
        run: |
          test -d .build/TextLens.app
          plutil -lint .build/TextLens.app/Contents/Info.plist
          codesign -dv .build/TextLens.app

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextLens-app
          path: .build/TextLens.app
          retention-days: 7
